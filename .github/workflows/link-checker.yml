name: Link Checker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1" # every Monday at 10 am

jobs:
  link-checker:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Link Checker
        uses: digitalservicebund/link-checker-gha@3d191ff542e89f1c205793495a32ff9599eab8e4 # v1.0.1
        with:
          SITEMAP_URL: "https://zfl.bund.de/sitemap-0.xml"
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

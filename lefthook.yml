commit-msg:
  commands:
    lint-commit-msg:
      run: npx --yes commitlint --edit
pre-commit:
  parallel: true
  commands:
    talisman:
      tags: security audit
      run: talisman --githook pre-commit
pre-push:
  parallel: true
  commands:
    lint:
      tags: style
      run: pnpm lint {staged_files}
      glob: "*.{js,cjs,mjs,ts,jsx,tsx,json,css,md,yml,yaml,html,astro}"
    check-format:
      tags: style
      run: pnpm format {staged_files}
      glob: "*.{js,cjs,mjs,ts,jsx,tsx,json,css,md,yml,yaml,html,astro}"
    typecheck:
      tags: style
      run: pnpm typecheck
      glob: "*.{ts,tsx,astro}"
    licenses-audit:
      tags: licenses audit
      run: pnpm audit:licences
